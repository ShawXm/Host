<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANDYAS STORE 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Header Section */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(212,175,55,0.2) 0%, transparent 100%);
            border-bottom: 2px solid #d4af37;
            position: relative;
        }

        .crown {
            font-size: 50px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px #d4af37);
        }

        .store-name {
            font-size: 36px;
            font-weight: 900;
            color: #d4af37;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        .subtitle {
            color: #d4af37;
            font-size: 18px;
            margin-top: 10px;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }

        .card-title {
            font-size: 22px;
            color: #d4af37;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .card-content {
            color: #ccc;
            line-height: 1.8;
            font-size: 16px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .product-card {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 5px;
        }

        /* Payment Section */
        .payment-section {
            background: rgba(212,175,55,0.1);
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 30px 0;
        }

        .payment-title {
            font-size: 20px;
            color: #fff;
            margin-bottom: 15px;
        }

        .phone-number {
            font-size: 28px;
            font-weight: 900;
            color: #000;
            background: #d4af37;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            margin: 10px 0;
        }

        .payment-methods {
            color: #d4af37;
            font-size: 16px;
            margin-top: 15px;
        }

        /* Order Form */
        .order-form {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(212,175,55,0.2);
        }

        .form-title {
            text-align: center;
            font-size: 22px;
            color: #d4af37;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 16px;
            text-align: right;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #d4af37;
        }

        .form-input::placeholder {
            color: #666;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(212,175,55,0.3);
            margin-top: 40px;
        }

        .owner {
            font-size: 20px;
            color: #d4af37;
            font-weight: 700;
        }

        .crown-icon {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="crown">👑</div>
        <h1 class="store-name">KANDYAS STORE 👑</h1>
        <p class="subtitle">چەناڵی تێلێگرام KANDYAS</p>
    </header>

    <div class="container">
        <!-- Video Tutorial Section -->
        <div class="card">
            <h2 class="card-title">🎥 ڤیدیۆی فێرکاری هاکەکان</h2>
        </div>

        <!-- Products Section -->
        <div class="card">
            <div class="products-grid">
                <div class="product-card">
                    <div class="product-name">OASIS King</div>
                </div>
                <div class="product-card">
                    <div class="product-name">iOS KING MOD</div>
                </div>
                <div class="product-card">
                    <div class="product-name">iOS ZOON Zolo</div>
                </div>
                <div class="product-card">
                    <div class="product-name">Cheat Loader DH</div>
                </div>
            </div>
        </div>

        <!-- Payment Section -->
        <div class="payment-section">
            <h2 class="payment-title">بڕی پارەکە بنێرە بۆ ئەم ژمارەیە:</h2>
            <div class="phone-number">0750 XXX XXXX</div>
            <div class="payment-methods">کۆرەک / زین / ئاسیا / FIB / FastPay</div>
        </div>

        <!-- Order Form -->
        <div class="order-form">
            <h2 class="form-title">📝 جۆری هاک و نرخەکان</h2>
            <form>
                <div class="form-group">
                    <label class="form-label">ماوەی کۆدەکە هەڵبژێرە</label>
                    <select class="form-select" required>
                        <option value="">هەڵبژێرە</option>
                        <option>1 ڕۆژ</option>
                        <option>3 ڕۆژ</option>
                        <option>7 ڕۆژ</option>
                        <option>30 ڕۆژ</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">ناوی تێلێگرامت یان یوزەرنەیم</label>
                    <input type="text" class="form-input" placeholder="@username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">ئەو ژمارەیەی پارەت پێ ناردووە</label>
                    <input type="tel" class="form-input" placeholder="07XX XXX XXXX" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">وێنەی پسوڵەی پارەکە (Screenshot)</label>
                    <input type="file" class="form-input" accept="image/*" required>
                </div>
                
                <button type="submit" class="submit-btn">ناردن</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="crown-icon">👑</div>
        <div class="owner">خاوەنی وێب سایت: KANDYAS 👑</div>
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('داواکردنەکەت نێردرا!');
        });
    </script>
</body>
</html>
